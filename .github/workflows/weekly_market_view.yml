name: Weekly Market View

on:
  schedule:
    # 10:00 AM UTC Saturday = 5:00 PM ICT Friday (after VN market close)
    - cron: '0 10 * * 6'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate weekly market view
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: python weekly_bot.py

      - name: Commit and push if new content
        run: |
          git config user.name "Market Bot"
          git config user.email "bot@truonghuyresearch.xyz"
          git add -A
          git diff --staged --quiet || git commit -m "weekly: market view $(date +%Y-%m-%d)"
          git push
