name: Weekly Market View

on:
  schedule:
    # 10:00 UTC Friday = 17:00 ICT Friday
    - cron: '0 10 * * 5'
  workflow_dispatch:

concurrency:
  group: market-bot
  cancel-in-progress: false

jobs:
  collect-foreign-flow:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Collect today foreign flow
        run: python weekly_bot.py --collect-foreign-flow
      - name: Commit cache
        run: |
          git config user.name "Market Bot"
          git config user.email "bot@truonghuyresearch.xyz"
          git add -A
          git diff --staged --quiet || git commit -m "cache: foreign flow"
          git push

  generate:
    needs: collect-foreign-flow
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate weekly market view
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY || secrets.OPENAI_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL || 'https://api.openai.com/v1' }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gpt-5.2' }}
        run: python weekly_bot.py
      - name: Commit and push if new content
        run: |
          git config user.name "Market Bot"
          git config user.email "bot@truonghuyresearch.xyz"
          git add -A
          git diff --staged --quiet || git commit -m "weekly: market view"
          git push
